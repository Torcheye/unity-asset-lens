<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AssetLens</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='7' cy='7' r='4.6' fill='none' stroke='%235b8cff' stroke-width='1.7'/%3E%3Cline x1='10.7' y1='10.7' x2='14' y2='14' stroke='%235b8cff' stroke-width='1.7' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    /* Fluid base: 1rem tracks viewport width so all rem-based type scales with the screen.
       ~15.5px on a 1280 laptop, ~18px at 2000px, capped at 21px on ultrawide. */
    html { font-size: clamp(15px, 0.36vw + 10.9px, 21px); }
    html, body { margin: 0; padding: 0; height: 100%; background: #0e0e10; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #34343c; border-radius: 6px; border: 2px solid #161619; }
    ::-webkit-scrollbar-track { background: transparent; }
    input, button, select { font-family: inherit; }
    input::placeholder { color: #5e5e68; }
    a { color: inherit; }
    @keyframes altoast { from { transform: translate(-50%, 14px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    @keyframes alpulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(70, 217, 160, 0.28); } 50% { box-shadow: 0 0 0 4px rgba(70, 217, 160, 0); } }
    @keyframes albar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
    @keyframes alspin { to { transform: rotate(360deg); } }
    .al-bar-indeterminate {
      position: absolute; top: 0; left: 0; height: 100%; width: 40%;
      background: linear-gradient(90deg, #3a63d6, #5b8cff);
      border-radius: 4px; animation: albar 1.1s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
